storage:
  backend: file   # options: file | sqlite (Phase 2)

llm:
  global: anthropic
  providers:
    anthropic: { model: claude-sonnet-4-6 }
    gemini:    { model: gemini-2.5-flash }
    ollama:    { model: llama2, base_url: "http://localhost:11434" }
  tasks:
    summarize:       global
    prompt_creation: global
    # Override examples (uncomment to enable):
    # summarize: gemini
    # prompt_creation: "ollama:llama2"

content_source:
  type: upload            # upload | configured_file
  path: ./content/Glossary.txt

output:
  aspects:
    "9:16": [1080, 1920]
    "16:9": [1920, 1080]
  default_aspect: "9:16"

overlay:
  engine: html            # html (Playwright) | pillow

image_models:
  - id: gemini-flash-image
    name: "Gemini 2.5 Flash Image"
    provider: google
    model: gemini-2.5-flash-image
    api: generate_content
    num_images: 4
  - id: imagen4
    name: "Imagen 4"
    provider: google
    model: imagen-4.0-generate-001
    api: generate_images
    num_images: 4
  - id: imagen4-fast
    name: "Imagen 4 Fast"
    provider: google
    model: imagen-4.0-fast-generate-001
    api: generate_images
    num_images: 4
